server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    location / { try_files $uri $uri/ /index.html; }
    location /api/ { proxy_pass http://backend:8000/api/; }
    location /graphql/ { proxy_pass http://backend:8000/graphql/; }
}
